# =============================================================================
# UMI Lance dataset config
# =============================================================================

lance_source: "tencent/Hy-Embodied-0.5-VLA-Data"  # local dir or HF Hub repo id

lance_tables: "all"  # "all" or comma-separated table names

# lance_cache_dir: null  # optional HF Hub cache dir

# -----------------------------------------------------------------------------
# Image augmentation
# -----------------------------------------------------------------------------
image_aug: True
camera_randomcrop_aug: True
cond_mask_prob: 0.0
cam_ext_mask_prob: -1.0

# -----------------------------------------------------------------------------
# History sampling
# -----------------------------------------------------------------------------
img_history_size: 1
img_history_interval: 1
img_history_random_sample: False

# -----------------------------------------------------------------------------
# Action chunk
# -----------------------------------------------------------------------------
action_chunk_size: 50
state_dim: 32
num_cameras: 3
image_size: 224
auto_adjust_image_brightness: True

# -----------------------------------------------------------------------------
# Normalization
# -----------------------------------------------------------------------------
mean_std_path: "/path/to/umi_lance/norm_stats.pkl"
mean_std_chunk_slice: 50

# -----------------------------------------------------------------------------
# Action representation
# -----------------------------------------------------------------------------
act_type: "relative_chunk_ee_RT"

# -----------------------------------------------------------------------------
# Sampling
# -----------------------------------------------------------------------------
downsample_rate: 3

# -----------------------------------------------------------------------------
# Episode filter
# -----------------------------------------------------------------------------
filter_dirty: False

# -----------------------------------------------------------------------------
# Enumeration
# -----------------------------------------------------------------------------
deterministic: False

# -----------------------------------------------------------------------------
# Video-encoder
# -----------------------------------------------------------------------------
use_video_encoder: False
